version: '3.8'
services:
  backend:
    build: .
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./korzadivpn.db:/app/korzadivpn.db
    env_file:
      - .env
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - korzadi-net

networks:
  korzadi-net:
    driver: bridge
